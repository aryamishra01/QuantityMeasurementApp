# Application name
spring.application.name=quantity-measurement-app
 
# ─── H2 In-Memory Database ───
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
# ─── JPA / Hibernate ───
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# creates tables on start, drops on stop
spring.jpa.hibernate.ddl-auto=create-drop   
# prints SQL to console (dev only)
spring.jpa.show-sql=true                    

spring.jpa.properties.hibernate.format_sql=true
 
# ─── H2 Console (access at http://localhost:8080/h2-console) ───
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
 
# ─── Logging ───
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
 
# ─── Swagger / OpenAPI ───
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
 
# ─── Actuator ───
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
 
# ─── Server port ───
server.port=8080