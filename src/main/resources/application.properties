# Application name
spring.application.name=quantity-measurement-app
 
# \u2500\u2500\u2500 H2 In-Memory Database \u2500\u2500\u2500
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
# \u2500\u2500\u2500 JPA / Hibernate \u2500\u2500\u2500
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# creates tables on start, drops on stop
spring.jpa.hibernate.ddl-auto=create-drop   
# prints SQL to console (dev only)
spring.jpa.show-sql=true                    

spring.jpa.properties.hibernate.format_sql=true
 
# \u2500\u2500\u2500 H2 Console (access at http://localhost:8080/h2-console) \u2500\u2500\u2500
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
 
# \u2500\u2500\u2500 Logging \u2500\u2500\u2500
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
 
# \u2500\u2500\u2500 Swagger / OpenAPI \u2500\u2500\u2500
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
 
# \u2500\u2500\u2500 Actuator \u2500\u2500\u2500
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
 
# \u2500\u2500\u2500 Server port \u2500\u2500\u2500
server.port=8080